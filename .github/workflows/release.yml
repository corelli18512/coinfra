name: Release

on:
  push:
    branches:
      - main

# Trusted Publishing (OIDC) — no long-lived NPM_TOKEN. The npm CLI performs the
# OIDC handshake at publish time, so id-token:write is required. contents:write
# lets the changesets action push the "Version Packages" commit + tags;
# pull-requests:write lets it open/update the Version Packages PR.
permissions:
  id-token: write
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      # ubuntu-latest ships npm 10.9.8; OIDC trusted publishing needs >= 11.5.1.
      - name: Upgrade npm for OIDC support
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # changesets/action >= v1.7.0 detects OIDC and skips writing an .npmrc
      # authToken. `version` runs `changeset version` to open the Version
      # Packages PR; `publish` runs `changeset publish` (via `pnpm release`)
      # once that PR is merged. Do NOT set NPM_TOKEN (it shadows OIDC) and do
      # NOT force provenance while the repo is private (auto-skips).
      - name: Create Release PR or Publish
        uses: changesets/action@v1.9.0
        with:
          version: pnpm version-packages
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
